<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Project 4 — Diya Parmar</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .proj-empty{
      min-height:100vh;
      background:var(--dark);
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      text-align:center;gap:24px;
      padding:120px 40px 80px;
    }
    .proj-empty-num{
      font-family:'Cormorant Garamond',serif;
      font-size:8rem;font-weight:300;
      color:rgba(255,255,255,.04);
      line-height:1;
    }
    .proj-empty-label{
      font-size:.62rem;letter-spacing:.45em;
      text-transform:uppercase;color:var(--gold);
    }
    .proj-empty-title{
      font-family:'Cormorant Garamond',serif;
      font-size:clamp(2.5rem,6vw,5rem);
      font-weight:300;font-style:italic;
      color:rgba(255,255,255,.12);
      line-height:1.1;
    }
    .proj-empty-note{
      font-size:.75rem;font-weight:300;
      letter-spacing:.1em;color:rgba(255,255,255,.2);
      margin-top:8px;
    }
    .proj-empty-divider{
      width:1px;height:60px;
      background:linear-gradient(to bottom,var(--gold),transparent);
      margin:8px auto;
    }
  </style>
</head>
<body>
<div id="cursor"></div>
<div id="cursor-ring"></div>

<nav class="proj-page-nav">
  <a class="back-btn" href="index.html">← Back to Portfolio</a>
  <span class="proj-title-nav">Project 4</span>
</nav>

<div class="proj-empty">
  <p class="proj-empty-label">Selected Work · 04</p>
  <div class="proj-empty-num">04</div>
  <div class="proj-empty-divider"></div>
  <h1 class="proj-empty-title">Project 4</h1>
  <p class="proj-empty-note">Details coming soon — this page will be updated shortly.</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
const cursor=document.getElementById('cursor'),ring=document.getElementById('cursor-ring');
let mx=-100,my=-100,rx=-100,ry=-100;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;});
(function a(){rx+=(mx-rx)*.12;ry+=(my-ry)*.12;cursor.style.left=mx+'px';cursor.style.top=my+'px';ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(a);})();
document.querySelectorAll('a').forEach(el=>{
  el.addEventListener('mouseenter',()=>{ring.style.width='64px';ring.style.height='64px';});
  el.addEventListener('mouseleave',()=>{ring.style.width='36px';ring.style.height='36px';});
});
gsap.from('.proj-empty-num',{opacity:0,scale:.9,duration:1.4,ease:'power3.out',delay:.3});
gsap.from('.proj-empty-title',{opacity:0,y:30,duration:1,ease:'power3.out',delay:.6});
gsap.from('.proj-empty-note',{opacity:0,y:20,duration:.8,ease:'power3.out',delay:.9});
</script>
</body>
</html>
